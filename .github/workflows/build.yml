# WinFusion Android APK 构建工作流
# 该工作流用于构建 WinFusion Android 应用程序 APK
# 支持手动触发，可选择从不同分支拉取源码进行构建

name: Build WinFusion APK

on:
  workflow_dispatch:
    inputs:
      branch:
        description: '源码分支'
        required: true
        default: 'main'
        type: string
      build_type:
        description: '构建类型'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
      clean_build:
        description: '执行清理构建'
        required: false
        default: 'false'
        type: boolean

jobs:
  build:
    name: 构建APK
    runs-on: ubuntu-latest
    
    steps:
      # 检出指定分支的源码
      - name: 检出源码分支
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 1
          lfs: true
      
      # 配置 Java JDK 17（AGP 9.1.0 和 Gradle 9.3.1 的要求）
      - name: 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      
      # 配置 Android SDK
      - name: 配置 Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '11076700'
      
      # 根据项目要求安装特定的 SDK 组件
      - name: 安装所需的 Android SDK 组件
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;29.0.14206865" \
            "cmake;3.22.1"
      
      # 配置 Gradle
      - name: 配置 Gradle
        uses: gradle/actions/setup-gradle@V4
        with:
          gradle-version: 9.3.1
      
      # 缓存 Gradle 依赖
      - name: 缓存 Gradle 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      
      # 缓存 Android SDK 组件
      - name: 缓存 Android SDK
        uses: actions/cache@v4
        with:
          path: |
            ${{ runner.android_sdk.sdk_root }}/ndk/29.0.14206865
            ${{ runner.android_sdk.sdk_root }}/cmake/3.22.1
            ${{ runner.android_sdk.sdk_root }}/build-tools/36.0.0
            ${{ runner.android_sdk.sdk_root }}/platforms/android-36
          key: ${{ runner.os }}-android-sdk-${{ hashFiles('.github/workflows/android.yml') }}
          restore-keys: |
            ${{ runner.os }}-android-sdk-
      
      # 如果请求清理则清理构建产物
      - name: 清理构建产物
        if: inputs.clean_build == 'true'
        run: |
          cd app && ../gradlew clean
      
      # 构建 APK
      - name: 构建 ${{ inputs.build_type }} APK
        run: |
          cd app && ../gradlew assemble${{ inputs.build_type == 'release' && 'Release' || 'Debug' }} \
            --no-daemon \
            --stacktrace
        env:
          # 配置 Gradle JVM 参数
          ORG_GRADLE_PROJECT_JVM_OPTS: "-Xmx4g -XX:+HeapDumpOnOutOfMemoryError"
          # 禁用 Gradle 配置缓存以保证兼容性
          GRADLE_CONFIGURATION_CACHE: "false"
      
      # 验证构建输出是否存在
      - name: 验证 APK 输出
        id: verify_output
        run: |
          if [ "${{ inputs.build_type }}" = "debug" ]; then
            APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          else
            APK_PATH="app/build/outputs/apk/release/app-release.apk"
          fi
          
          if [ -f "$APK_PATH" ]; then
            echo "APK 存在于: $APK_PATH"
            echo "APK_SIZE=$(du -h $APK_PATH | cut -f1)" >> $GITHUB_OUTPUT
            echo "APK_PATH=$APK_PATH" >> $GITHUB_OUTPUT
          else
            echo "错误: 未在 $APK_PATH 找到 APK"
            ls -la app/build/outputs/apk/ 2>/dev/null || echo "未找到 APK 目录"
            exit 1
          fi
      
      # 上传 APK 作为构建产物
      - name: 上传 APK 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: winfusion-${{ inputs.branch }}-${{ inputs.build_type }}-apk
          path: ${{ steps.verify_output.outputs.APK_PATH }}
          retention-days: 7
          compression-level: 9
      
      # 显示 APK 信息
      - name: 显示构建结果
        run: |
          echo "=========================================="
          echo "  构建成功完成!"
          echo "=========================================="
          echo ""
          echo "源码分支: ${{ inputs.branch }}"
          echo "构建类型: ${{ inputs.build_type }}"
          echo "APK 位置: ${{ steps.verify_output.outputs.APK_PATH }}"
          echo "APK 大小: ${{ steps.verify_output.outputs.APK_SIZE }}"
          echo ""
          echo "下载 APK 的方法:"
          echo "1. 进入本次工作流运行的 Artifacts 部分"
          echo "2. 下载 'winfusion-${{ inputs.branch }}-${{ inputs.build_type }}-apk' 构建产物"
